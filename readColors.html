<html>
<head>
   <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500&display=swap" rel="stylesheet">
    <!-- google fonts -->
    
    <title>cannon</title>
    
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Poppins', sans-serif;
        }
        html{
            scroll-behavior: smooth;
        }
        body{
            width:100vw;
            height:100vh;
            background-color:white;
            overflow: hidden;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-direction: row;
            position:relative;
        }
        .flex{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        
    </style>
    
    </head>
    
<body>

<button onclick="startGame()">Load Game</button>
<button onclick="stopRecording()">Stop</button>

<div id="game"></div>
<div>Score: <span id="score">0</span></div>

<script>
const colors = ["red","blue","green","yellow","orange","purple","black","pink","brown"];
let gameData = [];
let currentIndex = 0;
let score = 0;

let recognition;
let isRecording = false;

function getRandomColor(exclude){
    let filtered = colors.filter(c => c !== exclude);
    return filtered[Math.floor(Math.random()*filtered.length)];
}

function generateGame(){
    gameData = [];
    for(let i=0;i<20;i++){
        let word = colors[Math.floor(Math.random()*colors.length)];
        let displayColor = getRandomColor(word);

        gameData.push({
            word,
            color: displayColor
        });
    }
}

function renderWord(){
    const gameDiv = document.getElementById("game");
    gameDiv.innerHTML = "";

    gameData.forEach((item, index) => {
        let span = document.createElement("span");
        span.textContent = item.word + " ";
        span.style.color = item.color;
        span.style.fontSize = "28px";
        span.style.margin = "5px";
        span.style.display = "inline-block";

        // highlight current word
        if(index === currentIndex){
            span.style.borderBottom = "3px solid black";
        }

        gameDiv.appendChild(span);
    });
}

function startGame(){
    score = 0;
    currentIndex = 0;
    document.getElementById("score").textContent = score;

    generateGame();
    renderWord();
    startRecording();
}

function startRecording() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();

    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = 'en-US';

    recognition.onresult = (event) => {
        let transcript = event.results[event.results.length-1][0].transcript.trim().toLowerCase();
        console.log("User said:", transcript);

        checkAnswer(transcript);
    };

    recognition.onend = () => {
        if (isRecording) recognition.start();
    };

    isRecording = true;
    recognition.start();
}

function checkAnswer(userInput){
    let current = gameData[currentIndex];

    if(userInput.includes(current.color)){
        score++;
        document.getElementById("score").textContent = score;
    }

    currentIndex++;
    renderWord();
}

function stopRecording() {
    if (recognition) {
        isRecording = false;
        recognition.stop();
    }
}
</script>

</body>

</html>
